name: Build and push
on:
  pull_request:
    branches:
      - main
  push:
    tags:        
      - '*'

jobs:
  build-and-push:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            arch: linux/amd64
            file-suffix: amd64
          - os: ubuntu-24.04-arm
            arch: linux/arm64
            file-suffix: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            docker.io/davidcasado/que-me-falta
            ghcr.io/dcasado/que-me-falta
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.arch }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Login to Github Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker images
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.arch }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=docker,dest=${{ runner.temp }}/que-me-falta.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: que-me-falta-${{ matrix.file-suffix }}
          path: ${{ runner.temp }}/que-me-falta-${{ matrix.file-suffix }}.tar

  push-images:
    needs: [build-and-push]
    runs-on: ubuntu-24.04
    steps:
      - name: Download amd64 image
        uses: actions/download-artifact@v4
        with:
          name: que-me-falta-amd64
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/que-me-falta-amd64.tar
          docker image ls -a

      - name: Download arm64 image
        uses: actions/download-artifact@v4
        with:
          name: que-me-falta-arm64
          path: ${{ runner.temp }}

      - name: Load image
        run: |
          docker load --input ${{ runner.temp }}/que-me-falta-arm64.tar
          docker image ls -a

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          # list of Docker images to use as base name for tags
          images: |
            docker.io/davidcasado/que-me-falta
            ghcr.io/dcasado/que-me-falta
          # generate Docker tags based on the following events/attributes
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Push Docker images
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}      
